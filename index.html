<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>

<style>
  .popup {
    position: fixed;
    left: 10px;
    top: 20px;
    background: #cff122;
    width: 300px;
    height: 300px;
    align-items: center;
    border-radius: 30px;
    display: flex;
    justify-content: right;
    font-weight: 800;
    font-family: system-ui;
    box-shadow: 7px 7px #b7d131;
    transform: translateX(-120%);

    animation: slideIn 0.6s ease-out forwards;
    animation-delay: 2s;
}

  @keyframes slideIn {
    from {
    transform: translateX(-120%);
  }
  to {
    transform: translateX(0);
  }
}
  .button{
    background: #000000;
    padding: 10px 10px 10px 10px;
    position: absolute;
    width: 100px;
    height: 20px;
    border-radius: 30px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
  }
  
</style>
  
</head>
<body>

<div class="popup">
  GET $10 OFF NOW
</div>

  <div class="button">
    CLAIM NOW
  </div>

</body>
</html>
