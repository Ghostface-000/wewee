<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>

<style>
  .popup {
    position: fixed;
    left: 10px;
    bottom: 20px;
    background: #cff122;
    width: 300px;
    height: 300px;
    align-items: center;
    border-radius: 30px;
    display: flex;
    justify-content: right;
    font-weight: 800;
    font-family: system-ui;
    background-image: url(https://www.w3schools.com/css/ocean.jpg);
    box-shadow: 7px 7px #b7d131;
    transform: translateX(-120%);

    animation: slideIn 0.6s ease-out forwards;
    animation-delay: 2s;
}

  &:hover{
    transform:
    perspective(800px)
      rotateY(-15deg)
      translateY(-50px)
      rotateX(10deg)
      scale(1);
    filter: blur(0);
    opacity: 1;
  }

  @keyframes slideIn {
    from {
    transform: translateX(-120%);
  }
  to {
    transform: translateX(0);
  }
}
  .button{
    background: #000000;
    padding: 10px 10px 10px 10px;
    position: absolute;
    width: 100px;
    height: 25px;
    border-radius: 30px;
    border: 2px white solid;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-family: system-ui;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
  }
  
</style>
  
</head>
<body>

<div class="popup">
  GET $10 OFF NOW
    <div class="button">
    CLAIM NOW
  </div>
</div>

</body>
</html>
